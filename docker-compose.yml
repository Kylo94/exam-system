version: '3.8'

services:
  # FastAPI应用
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: exam_system_fastapi
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/exam_system
      - SECRET_KEY=your-secret-key-change-in-production
      - DEBUG=false
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - exam_network

  # PostgreSQL数据库
  db:
    image: postgres:15-alpine
    container_name: exam_system_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=exam_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker-init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - exam_network

  # Nginx反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: exam_system_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - exam_network
    profiles:
      - with-nginx

volumes:
  postgres_data:

networks:
  exam_network:
    driver: bridge
