version: '3.8'

services:
  db:
    image: postgres:14-alpine
    container_name: exam-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-examdb}
      POSTGRES_USER: ${POSTGRES_USER:-examuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-exam_password_123456}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - exam-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-examuser} -d ${POSTGRES_DB:-examdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build: .
    image: exam-system:latest
    container_name: exam-web
    ports:
      - "5002:5002"
    environment:
      # Flask 配置
      FLASK_ENV: production
      FLASK_DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}

      # 数据库配置
      DATABASE_URL: postgresql://${POSTGRES_USER:-examuser}:${POSTGRES_PASSWORD:-exam_password_123456}@db:5432/${POSTGRES_DB:-examdb}

      # 管理员配置
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}

      # 文件上传配置
      MAX_CONTENT_LENGTH: ${MAX_CONTENT_LENGTH:-52428800}
      UPLOAD_FOLDER: /app/uploads

      # 日志配置
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./migrations:/app/migrations
    depends_on:
      db:
        condition: service_healthy
    networks:
      - exam-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  exam-network:
    driver: bridge
