version: '3.8'

services:
  # PostgreSQL 数据库
  db:
    image: postgres:14-alpine
    container_name: exam-postgres-prod
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c ssl=off
      -c listen_addresses='*'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-examdb}
      POSTGRES_USER: ${POSTGRES_USER:-examuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-exam_password_123456}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - exam-network-prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-examuser} -d ${POSTGRES_DB:-examdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Flask Web 应用
  web:
    build: .
    image: exam-system:prod
    container_name: exam-web-prod
    command: >
      sh -c "
      echo '等待数据库启动...' &&
      sleep 10 &&
      echo '运行数据库迁移...' &&
      flask db upgrade &&
      echo '创建管理员账户（如果不存在）...' &&
      python create_admin.py &&
      echo '启动 Gunicorn...' &&
      gunicorn --bind 0.0.0.0:5002 --workers 4 --threads 2 --worker-class sync --timeout 120 --access-logfile - --error-logfile - --log-level info wsgi:app
      "
    ports:
      - "${FLASK_PORT:-5002}:5002"
    environment:
      # Flask 配置
      FLASK_ENV: production
      FLASK_DEBUG: "false"

      # 数据库配置
      DATABASE_URL: postgresql://${POSTGRES_USER:-examuser}:${POSTGRES_PASSWORD:-exam_password_123456}@db:5432/${POSTGRES_DB:-examdb}

      # 安全配置
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}

      # 文件上传配置
      MAX_CONTENT_LENGTH: ${MAX_CONTENT_LENGTH:-52428800}
      UPLOAD_FOLDER: /app/uploads

      # 日志配置
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      # 持久化上传文件
      - ./uploads:/app/uploads
      # 持久化日志
      - ./logs:/app/logs
      # 数据库迁移文件
      - ./migrations:/app/migrations
    depends_on:
      db:
        condition: service_healthy
    networks:
      - exam-network-prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "from app import create_app; app = create_app('production'); test_client = app.test_client(); test_client.get('/').status_code == 200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data_prod:
    driver: local

networks:
  exam-network-prod:
    driver: bridge
