{% extends "base.html" %}

{% block title %}教师工作台 - {{ super() }}{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2 class="mb-4"><i class="bi bi-person-badge"></i> 教师工作台</h2>
    </div>
</div>

<div class="row g-4">
    <div class="col-md-3">
        <a href="/teacher/students" class="text-decoration-none">
            <div class="card border-primary h-100">
                <div class="card-body text-center">
                    <i class="bi bi-people fs-1 text-primary"></i>
                    <h5 class="mt-2">学生管理</h5>
                    <p class="text-muted small">查看我的学生</p>
                </div>
            </div>
        </a>
    </div>
    <div class="col-md-3">
        <a href="/teacher/exams" class="text-decoration-none">
            <div class="card border-success h-100">
                <div class="card-body text-center">
                    <i class="bi bi-file-earmark-plus fs-1 text-success"></i>
                    <h5 class="mt-2">我的试卷</h5>
                    <p class="text-muted small">创建和管理试卷</p>
                </div>
            </div>
        </a>
    </div>
    <div class="col-md-3">
        <a href="/teacher/submissions" class="text-decoration-none">
            <div class="card border-info h-100">
                <div class="card-body text-center">
                    <i class="bi bi-clipboard-data fs-1 text-info"></i>
                    <h5 class="mt-2">成绩管理</h5>
                    <p class="text-muted small">查看学生成绩</p>
                </div>
            </div>
        </a>
    </div>
    <div class="col-md-3">
        <a href="/teacher/ai-configs" class="text-decoration-none">
            <div class="card border-warning h-100">
                <div class="card-body text-center">
                    <i class="bi bi-robot fs-1 text-warning"></i>
                    <h5 class="mt-2">AI配置</h5>
                    <p class="text-muted small">配置AI批改</p>
                </div>
            </div>
        </a>
    </div>
</div>
{% endblock %}
