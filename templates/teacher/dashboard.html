{% extends "base.html" %}

{% block title %}教师仪表盘 - {{ super() }}{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2 class="mb-4"><i class="bi bi-speedometer2"></i> 教师工作台</h2>
    </div>
</div>

<!-- 统计卡片 -->
<div class="row g-4 mb-4">
    <div class="col-md-4">
        <div class="card bg-primary text-white">
            <div class="card-body">
                <h6 class="card-title">我的学生</h6>
                <h2>{{ stats.students_count }}</h2>
            </div>
            <div class="card-footer bg-transparent border-0">
                <a href="/teacher/students" class="text-white text-decoration-none">管理学生 <i class="bi bi-arrow-right"></i></a>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card bg-success text-white">
            <div class="card-body">
                <h6 class="card-title">创建的试卷</h6>
                <h2>{{ stats.exams_created }}</h2>
            </div>
            <div class="card-footer bg-transparent border-0">
                <a href="/teacher/exams" class="text-white text-decoration-none">查看试卷 <i class="bi bi-arrow-right"></i></a>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card bg-info text-white">
            <div class="card-body">
                <h6 class="card-title">答题记录</h6>
                <h2>{{ stats.submissions_count }}</h2>
            </div>
            <div class="card-footer bg-transparent border-0">
                <a href="/teacher/submissions" class="text-white text-decoration-none">查看记录 <i class="bi bi-arrow-right"></i></a>
            </div>
        </div>
    </div>
</div>

<!-- 快捷操作 -->
<div class="row">
    <div class="col-12">
        <h4 class="mb-3">快捷操作</h4>
    </div>
    <div class="col-md-4">
        <a href="/teacher/exams/create" class="btn btn-outline-primary w-100 py-3">
            <i class="bi bi-file-earmark-plus"></i> 创建试卷
        </a>
    </div>
    <div class="col-md-4">
        <a href="/teacher/students" class="btn btn-outline-success w-100 py-3">
            <i class="bi bi-people"></i> 学生管理
        </a>
    </div>
    <div class="col-md-4">
        <a href="/teacher/submissions" class="btn btn-outline-info w-100 py-3">
            <i class="bi bi-clipboard-data"></i> 成绩管理
        </a>
    </div>
</div>
{% endblock %}
