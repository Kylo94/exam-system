{% extends "base.html" %}

{% block title %}学生提交情况 - {{ app_name }}{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h2">
            <i class="bi bi-list-check me-2"></i>学生提交情况
        </h1>
    </div>

    <!-- 筛选区域 -->
    <div class="card shadow mb-4">
        <div class="card-header">
            <h5 class="mb-0"><i class="bi bi-funnel me-2"></i>筛选条件</h5>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-4">
                    <label for="studentSelect" class="form-label">选择学生</label>
                    <select class="form-select" id="studentSelect">
                        <option value="">请选择学生</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="statusFilter" class="form-label">提交状态</label>
                    <select class="form-select" id="statusFilter">
                        <option value="">全部</option>
                        <option value="pending">进行中</option>
                        <option value="submitted">已提交</option>
                        <option value="graded">已评分</option>
                    </select>
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button class="btn btn-primary w-100" id="filterBtn">
                        <i class="bi bi-search me-1"></i>筛选
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 提交记录列表 -->
    <div class="card shadow">
        <div class="card-header">
            <h5 class="mb-0"><i class="bi bi-journal-text me-2"></i>提交记录</h5>
        </div>
        <div class="card-body">
            <div id="loadingSpinner" class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">加载中...</span>
                </div>
                <p class="mt-3 text-muted">加载数据中...</p>
            </div>

            <div id="submissionsTable" class="d-none">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>考试名称</th>
                                <th>学生姓名</th>
                                <th>得分</th>
                                <th>状态</th>
                                <th>开始时间</th>
                                <th>提交时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="submissionsBody">
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="emptyState" class="text-center py-5 d-none">
                <i class="bi bi-inbox fs-1 text-muted mb-3"></i>
                <p class="text-muted">暂无提交记录</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    let allSubmissions = [];
    let currentStudentId = null;

    // 加载学生列表
    async function loadStudents() {
        try {
            const response = await fetch('/api/teacher/students');
            const result = await response.json();

            if (result.success && result.data) {
                const select = document.getElementById('studentSelect');
                select.innerHTML = '<option value="">请选择学生</option>';
                result.data.forEach(student => {
                    const option = document.createElement('option');
                    option.value = student.id;
                    option.textContent = `${student.username} (${student.email})`;
                    select.appendChild(option);
                });
            }
        } catch (error) {
            console.error('加载学生列表失败:', error);
        }
    }

    // 加载所有提交记录
    async function loadAllSubmissions() {
        try {
            console.log('开始加载提交记录...');
            const response = await fetch('/api/teacher/submissions');
            const result = await response.json();

            console.log('提交记录API响应:', result);
            console.log('响应状态:', response.status);
            console.log('数据长度:', result.data ? result.data.length : 0);

            if (result.success && result.data) {
                allSubmissions = result.data;
                displaySubmissions(allSubmissions);
            } else {
                console.error('API返回错误:', result);
                displaySubmissions([]);
            }
        } catch (error) {
            console.error('加载提交记录失败:', error);
            displaySubmissions([]);
        }
    }

    // 显示提交记录
    function displaySubmissions(submissions) {
        const loadingSpinner = document.getElementById('loadingSpinner');
        const submissionsTable = document.getElementById('submissionsTable');
        const emptyState = document.getElementById('emptyState');
        const tbody = document.getElementById('submissionsBody');

        loadingSpinner.classList.add('d-none');

        if (!submissions || submissions.length === 0) {
            submissionsTable.classList.add('d-none');
            emptyState.classList.remove('d-none');
            return;
        }

        emptyState.classList.add('d-none');
        submissionsTable.classList.remove('d-none');
        tbody.innerHTML = '';

        submissions.forEach(sub => {
            const statusBadge = getStatusBadge(sub.status);

            // 计算得分显示和颜色
            let scoreDisplay = '-';
            let scoreClass = '';
            if (sub.obtained_score !== null) {
                scoreDisplay = sub.obtained_score;
                scoreClass = sub.obtained_score >= 60 ? 'text-success fw-bold' : 'text-danger fw-bold';
            }

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${sub.exam ? sub.exam.title : '未知考试'}</td>
                <td>${sub.student_name || '未知'}</td>
                <td class="${scoreClass}">${scoreDisplay}</td>
                <td>${statusBadge}</td>
                <td>${formatDate(sub.started_at)}</td>
                <td>${formatDate(sub.submitted_at)}</td>
                <td>
                    <a href="/submission/${sub.id}/result" class="btn btn-sm btn-outline-primary" target="_blank">
                        <i class="bi bi-eye"></i> 查看
                    </a>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 获取状态徽章
    function getStatusBadge(status) {
        const badges = {
            'pending': '<span class="badge bg-warning">进行中</span>',
            'submitted': '<span class="badge bg-info">已提交</span>',
            'graded': '<span class="badge bg-success">已评分</span>'
        };
        return badges[status] || '<span class="badge bg-secondary">未知</span>';
    }

    // 格式化日期
    function formatDate(dateStr) {
        if (!dateStr) return '-';
        const date = new Date(dateStr);
        return date.toLocaleString('zh-CN');
    }

    // 筛选按钮
    document.getElementById('filterBtn').addEventListener('click', function() {
        const studentId = document.getElementById('studentSelect').value;
        const status = document.getElementById('statusFilter').value;

        let filtered = allSubmissions;

        if (studentId) {
            filtered = filtered.filter(sub => sub.student_id === parseInt(studentId));
        }

        if (status) {
            filtered = filtered.filter(sub => sub.status === status);
        }

        displaySubmissions(filtered);
    });

    // 初始化
    loadStudents();
    loadAllSubmissions();
});
</script>
{% endblock %}
