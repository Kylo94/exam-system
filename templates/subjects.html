<!DOCTYPE html>
<html lang="zh-CN">
<head>
    {% include "partials/head.html" %}
    <title>{{ app_name }} - 科目管理</title>
</head>
<body>
    {% include "partials/navbar.html" %}
    
    <main class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3">科目管理</h1>
            <div>
                <button class="btn btn-primary" onclick="showCreateModal()">
                    <i class="bi bi-plus-circle me-1"></i>添加科目
                </button>
            </div>
        </div>
        
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover" id="subjects-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>名称</th>
                                <th>描述</th>
                                <th>状态</th>
                                <th>排序</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="subjects-body">
                            <!-- 动态加载 -->
                        </tbody>
                    </table>
                </div>
                <div id="subjects-pagination" class="d-flex justify-content-center">
                    <!-- 分页 -->
                </div>
            </div>
        </div>
    </main>
    
    <!-- 创建科目模态框 -->
    <div class="modal fade" id="createSubjectModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">创建新科目</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="create-subject-form">
                        <div class="mb-3">
                            <label for="subject-name" class="form-label">科目名称 *</label>
                            <input type="text" class="form-control" id="subject-name" required>
                        </div>
                        <div class="mb-3">
                            <label for="subject-description" class="form-label">描述</label>
                            <textarea class="form-control" id="subject-description" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="subject-order" class="form-label">排序索引</label>
                            <input type="number" class="form-control" id="subject-order" value="0">
                        </div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="subject-active" checked>
                            <label class="form-check-label" for="subject-active">
                                启用科目
                            </label>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="createSubject()">创建</button>
                </div>
            </div>
        </div>
    </div>
    
    {% include "partials/footer.html" %}
    
    {% include "partials/scripts.html" %}
    
    <script>
        // 加载科目数据
        function loadSubjects(page = 1) {
            fetch(`/api/subjects?page=${page}&per_page=10`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const subjects = data.data.items;
                        const tbody = document.getElementById('subjects-body');
                        tbody.innerHTML = '';
                        
                        subjects.forEach(subject => {
                            const row = document.createElement('tr');
                            row.innerHTML = `
                                <td>${subject.id}</td>
                                <td>
                                    <strong>${subject.name}</strong>
                                    ${subject.description ? `<br><small class="text-muted">${subject.description}</small>` : ''}
                                </td>
                                <td>${subject.description || '-'}</td>
                                <td>
                                    <span class="badge ${subject.is_active ? 'bg-success' : 'bg-secondary'}">
                                        ${subject.is_active ? '启用' : '禁用'}
                                    </span>
                                </td>
                                <td>${subject.order_index}</td>
                                <td>
                                    <button class="btn btn-sm btn-outline-warning" onclick="editSubject(${subject.id})">
                                        <i class="bi bi-pencil"></i> 编辑
                                    </button>
                                    <button class="btn btn-sm btn-outline-danger" onclick="deleteSubject(${subject.id})">
                                        <i class="bi bi-trash"></i> 删除
                                    </button>
                                </td>
                            `;
                            tbody.appendChild(row);
                        });
                        
                        // 更新分页
                        updatePagination(data.data.pagination);
                    }
                })
                .catch(error => {
                    console.error('加载科目失败:', error);
                });
        }
        
        function updatePagination(pagination) {
            const container = document.getElementById('subjects-pagination');
            if (!container) return;
            
            container.innerHTML = `
                <nav aria-label="科目分页">
                    <ul class="pagination">
                        <li class="page-item ${pagination.has_prev ? '' : 'disabled'}">
                            <a class="page-link" href="#" onclick="loadSubjects(${pagination.page - 1}); return false;">
                                上一页
                            </a>
                        </li>
                        ${Array.from({length: pagination.total_pages}, (_, i) => i + 1)
                            .map(page => `
                                <li class="page-item ${page === pagination.page ? 'active' : ''}">
                                    <a class="page-link" href="#" onclick="loadSubjects(${page}); return false;">
                                        ${page}
                                    </a>
                                </li>
                            `).join('')}
                        <li class="page-item ${pagination.has_next ? '' : 'disabled'}">
                            <a class="page-link" href="#" onclick="loadSubjects(${pagination.page + 1}); return false;">
                                下一页
                            </a>
                        </li>
                    </ul>
                </nav>
            `;
        }
        
        // 显示创建模态框
        function showCreateModal() {
            const modal = new bootstrap.Modal(document.getElementById('createSubjectModal'));
            modal.show();
        }
        
        // 创建科目
        function createSubject() {
            const name = document.getElementById('subject-name').value;
            const description = document.getElementById('subject-description').value;
            const orderIndex = document.getElementById('subject-order').value;
            const isActive = document.getElementById('subject-active').checked;
            
            if (!name) {
                alert('请输入科目名称');
                return;
            }
            
            fetch('/api/subjects', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: name,
                    description: description,
                    order_index: parseInt(orderIndex),
                    is_active: isActive
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('科目创建成功');
                    const modal = bootstrap.Modal.getInstance(document.getElementById('createSubjectModal'));
                    modal.hide();
                    loadSubjects();
                } else {
                    alert('创建失败: ' + data.message);
                }
            })
            .catch(error => {
                console.error('创建科目失败:', error);
                alert('创建失败，请检查网络连接');
            });
        }
        
        // 编辑科目
        function editSubject(id) {
            alert('编辑科目功能开发中，科目ID: ' + id);
            // 后续实现
        }
        
        // 删除科目
        function deleteSubject(id) {
            if (!confirm('确定要删除这个科目吗？')) {
                return;
            }
            
            fetch(`/api/subjects/${id}`, {
                method: 'DELETE'
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('科目删除成功');
                    loadSubjects();
                } else {
                    alert('删除失败: ' + data.message);
                }
            })
            .catch(error => {
                console.error('删除科目失败:', error);
                alert('删除失败，请检查网络连接');
            });
        }
        
        // 页面加载
        document.addEventListener('DOMContentLoaded', function() {
            loadSubjects();
        });
    </script>
</body>
</html>
