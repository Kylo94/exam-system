{% extends "base.html" %}

{% block title %}重置密码 - {{ app_name }}{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0"><i class="bi bi-key-fill me-2"></i>重置密码</h4>
                </div>
                <div class="card-body">
                    <p class="text-muted mb-4">
                        请输入您的新密码，密码长度至少6位。
                    </p>
                    
                    <form id="resetPasswordForm" novalidate>
                        <input type="hidden" id="token" value="{{ token }}">
                        
                        <div class="mb-3">
                            <label for="newPassword" class="form-label">新密码</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control" id="newPassword" 
                                       required minlength="6" maxlength="50"
                                       placeholder="请输入新密码（6-50位）">
                                <button class="btn btn-outline-secondary" type="button" id="toggleNewPassword">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                            <div class="form-text">密码长度6-50位</div>
                            <div class="invalid-feedback">密码不符合要求</div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">确认新密码</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                                <input type="password" class="form-control" id="confirmPassword" required
                                       placeholder="请再次输入新密码">
                                <button class="btn btn-outline-secondary" type="button" id="toggleConfirmPassword">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                            <div class="invalid-feedback">两次输入的密码不一致</div>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success" id="resetPasswordBtn">
                                <span id="resetPasswordText">重置密码</span>
                                <span id="resetPasswordSpinner" class="spinner-border spinner-border-sm d-none"></span>
                            </button>
                            
                            <a href="{{ url_for('auth.login_page') }}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left me-1"></i>返回登录
                            </a>
                        </div>
                    </form>
                    
                    <hr class="my-4">
                    
                    <div class="alert alert-warning">
                        <i class="bi bi-exclamation-triangle me-2"></i>
                        <strong>安全提示：</strong>
                        <ul class="mb-0 mt-2">
                            <li>请使用强密码，包含字母、数字和特殊字符</li>
                            <li>不要使用与其他网站相同的密码</li>
                            <li>建议定期更换密码</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // 密码显示切换
    function setupPasswordToggle(inputId, buttonId) {
        const button = document.getElementById(buttonId);
        const input = document.getElementById(inputId);
        
        button.addEventListener('click', function() {
            const icon = this.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        });
    }
    
    // 初始化密码显示切换
    setupPasswordToggle('newPassword', 'toggleNewPassword');
    setupPasswordToggle('confirmPassword', 'toggleConfirmPassword');
    
    // 密码验证
    function validatePassword() {
        const password = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        
        // 验证新密码
        if (password.length < 6) {
            document.getElementById('newPassword').classList.add('is-invalid');
            return false;
        } else {
            document.getElementById('newPassword').classList.remove('is-invalid');
        }
        
        // 验证密码确认
        if (confirmPassword && password !== confirmPassword) {
            document.getElementById('confirmPassword').classList.add('is-invalid');
            return false;
        } else {
            document.getElementById('confirmPassword').classList.remove('is-invalid');
            return true;
        }
    }
    
    // 实时验证
    document.getElementById('newPassword').addEventListener('input', validatePassword);
    document.getElementById('confirmPassword').addEventListener('input', validatePassword);
    
    // 表单提交
    document.getElementById('resetPasswordForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        e.stopPropagation();
        
        // 验证密码
        if (!validatePassword()) {
            this.classList.add('was-validated');
            return;
        }
        
        const token = document.getElementById('token').value;
        const newPassword = document.getElementById('newPassword').value.trim();
        const confirmPassword = document.getElementById('confirmPassword').value.trim();
        
        // 显示加载状态
        const resetBtn = document.getElementById('resetPasswordBtn');
        const resetText = document.getElementById('resetPasswordText');
        const resetSpinner = document.getElementById('resetPasswordSpinner');
        
        resetBtn.disabled = true;
        resetText.textContent = '重置中...';
        resetSpinner.classList.remove('d-none');
        
        try {
            // 模拟重置密码（实际项目中需要实现后端API）
            await new Promise(resolve => setTimeout(resolve, 1500));
            
            // 显示成功消息
            showAlert('密码重置成功，请使用新密码登录', 'success');
            
            // 清空表单
            document.getElementById('resetPasswordForm').reset();
            
            // 3秒后跳转到登录页面
            setTimeout(() => {
                window.location.href = "{{ url_for('auth.login_page') }}";
            }, 3000);
            
        } catch (error) {
            console.error('重置密码失败:', error);
            showAlert('重置失败，请稍后重试', 'danger');
            
            // 恢复按钮状态
            resetBtn.disabled = false;
            resetText.textContent = '重置密码';
            resetSpinner.classList.add('d-none');
        }
    });
    
    function showAlert(message, type) {
        // 移除现有警告
        const existingAlerts = document.querySelectorAll('.alert');
        existingAlerts.forEach(alert => alert.remove());
        
        // 创建新警告
        const alertHtml = `
            <div class="alert alert  -${type} alert-dismissible fade show" role="alert">
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        `;
        
        // 插入到表单上方
        const cardBody = document.querySelector('.card-body');
        cardBody.insertAdjacentHTML('afterbegin', alertHtml);
    }
</script>
{% endblock %}
