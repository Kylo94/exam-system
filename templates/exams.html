<!DOCTYPE html>
<html lang="zh-CN">
<head>
    {% include "partials/head.html" %}
    <title>{{ app_name }} - 考试管理</title>
</head>
<body>
    {% include "partials/navbar.html" %}
    
    <main class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3">考试管理</h1>
            <div>
                <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-secondary me-2">
                    <i class="bi bi-arrow-left me-1"></i>返回面板
                </a>
                <a href="{{ url_for('main.upload_page') }}" class="btn btn-primary">
                    <i class="bi bi-plus-circle me-1"></i>创建考试
                </a>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">
                <ul class="nav nav-tabs card-header-tabs" id="examsTab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="all-tab" data-bs-toggle="tab" data-bs-target="#all" type="button">
                            全部考试
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="active-tab" data-bs-toggle="tab" data-bs-target="#active" type="button">
                            进行中
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="upcoming-tab" data-bs-toggle="tab" data-bs-target="#upcoming" type="button">
                            即将开始
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="completed-tab" data-bs-toggle="tab" data-bs-target="#completed" type="button">
                            已结束
                        </button>
                    </li>
                </ul>
            </div>
            <div class="card-body">
                <div class="tab-content" id="examsTabContent">
                    <div class="tab-pane fade show active" id="all" role="tabpanel">
                        <div class="table-responsive">
                            <table class="table table-hover" id="exams-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>标题</th>
                                        <th>科目</th>
                                        <th>难度</th>
                                        <th>状态</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="exams-body">
                                    <!-- 动态加载 -->
                                </tbody>
                            </table>
                        </div>
                        <div id="exams-pagination" class="d-flex justify-content-center">
                            <!-- 分页 -->
                        </div>
                    </div>
                    
                    <div class="tab-pane fade" id="active" role="tabpanel">
                        <div id="active-exams">
                            <!-- 动态加载 -->
                        </div>
                    </div>
                    
                    <div class="tab-pane fade" id="upcoming" role="tabpanel">
                        <div id="upcoming-exams">
                            <!-- 动态加载 -->
                        </div>
                    </div>
                    
                    <div class="tab-pane fade" id="completed" role="tabpanel">
                        <div id="completed-exams">
                            <!-- 动态加载 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    {% include "partials/footer.html" %}
    
    {% include "partials/scripts.html" %}
    
    <script>
        // 加载考试数据
        function loadExams(page = 1) {
            fetch(`/api/exams?page=${page}&per_page=10`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const exams = data.data.items;
                        const tbody = document.getElementById('exams-body');
                        tbody.innerHTML = '';
                        
                        exams.forEach(exam => {
                            const row = document.createElement('tr');
                            row.innerHTML = `
                                <td>${exam.id}</td>
                                <td>
                                    <strong>${exam.title}</strong>
                                    ${exam.description ? `<br><small class="text-muted">${exam.description}</small>` : ''}
                                </td>
                                <td>${exam.subject ? exam.subject.name : '未知'}</td>
                                <td>${exam.level ? exam.level.name : '未知'}</td>
                                <td>
                                    <span class="badge ${exam.status.is_ongoing ? 'bg-success' : exam.status.is_upcoming ? 'bg-warning' : 'bg-secondary'}">
                                        ${exam.status.is_ongoing ? '进行中' : exam.status.is_upcoming ? '即将开始' : '已结束'}
                                    </span>
                                </td>
                                <td>
                                    <a href="/exams/${exam.id}" class="btn btn-sm btn-outline-primary">
                                        <i class="bi bi-eye"></i> 查看
                                    </a>
                                    <a href="/exams/${exam.id}/edit" class="btn btn-sm btn-outline-warning">
                                        <i class="bi bi-pencil"></i> 编辑
                                    </a>
                                </td>
                            `;
                            tbody.appendChild(row);
                        });
                        
                        // 更新分页
                        updatePagination(data.data.pagination);
                    }
                })
                .catch(error => {
                    console.error('加载考试失败:', error);
                });
        }
        
        function updatePagination(pagination) {
            const container = document.getElementById('exams-pagination');
            if (!container) return;
            
            container.innerHTML = `
                <nav aria-label="考试分页">
                    <ul class="pagination">
                        <li class="page-item ${pagination.has_prev ? '' : 'disabled'}">
                            <a class="page-link" href="#" onclick="loadExams(${pagination.page - 1}); return false;">
                                上一页
                            </a>
                        </li>
                        ${Array.from({length: pagination.total_pages}, (_, i) => i + 1)
                            .map(page => `
                                <li class="page-item ${page === pagination.page ? 'active' : ''}">
                                    <a class="page-link" href="#" onclick="loadExams(${page}); return false;">
                                        ${page}
                                    </a>
                                </li>
                            `).join('')}
                        <li class="page-item ${pagination.has_next ? '' : 'disabled'}">
                            <a class="page-link" href="#" onclick="loadExams(${pagination.page + 1}); return false;">
                                下一页
                            </a>
                        </li>
                    </ul>
                </nav>
            `;
        }
        
        // 加载其他分类的考试
        function loadActiveExams() {
            fetch('/api/exams/ongoing')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const container = document.getElementById('active-exams');
                        displayExamList(data.data, container);
                    }
                });
        }
        
        function loadUpcomingExams() {
            fetch('/api/exams/upcoming')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const container = document.getElementById('upcoming-exams');
                        displayExamList(data.data, container);
                    }
                });
        }
        
        function loadCompletedExams() {
            fetch('/api/exams/completed')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const container = document.getElementById('completed-exams');
                        displayExamList(data.data, container);
                    }
                });
        }
        
        function displayExamList(exams, container) {
            if (!exams || exams.length === 0) {
                container.innerHTML = '<p class="text-muted text-center py-4">暂无数据</p>';
                return;
            }
            
            const html = exams.map(exam => `
                <div class="card mb-3">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h5 class="card-title">${exam.title}</h5>
                                <p class="card-text text-muted small">
                                    科目: ${exam.subject_id} | 难度: ${exam.level_id}<br>
                                    时长: ${exam.duration_minutes}分钟
                                </p>
                            </div>
                            <a href="/exams/${exam.id}" class="btn btn-sm btn-outline-primary">
                                查看详情
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');
            
            container.innerHTML = html;
        }
        
        // 页面加载
        document.addEventListener('DOMContentLoaded', function() {
            loadExams();
            
            // 标签页切换监听
            const tabTriggers = document.querySelectorAll('button[data-bs-toggle="tab"]');
            tabTriggers.forEach(trigger => {
                trigger.addEventListener('shown.bs.tab', function(event) {
                    const target = event.target.getAttribute('data-bs-target');
                    if (target === '#active') {
                        loadActiveExams();
                    } else if (target === '#upcoming') {
                        loadUpcomingExams();
                    } else if (target === '#completed') {
                        loadCompletedExams();
                    }
                });
            });
        });
    </script>
</body>
</html>
