{% extends "base.html" %}

{% block title %}难度管理 - {{ super() }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-bar-chart"></i> 难度等级管理</h2>
    <button class="btn btn-primary" onclick="showAddModal()">
        <i class="bi bi-plus-circle"></i> 添加等级
    </button>
</div>

<div class="card">
    <div class="card-body">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>等级名称</th>
                    <th>描述</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                {% for level in levels %}
                <tr>
                    <td>{{ level.id }}</td>
                    <td>
                        <span class="badge bg-{{ 'success' if level.name == '简单' else ('warning' if level.name == '中等' else 'danger') }}">
                            {{ level.name }}
                        </span>
                    </td>
                    <td>{{ level.description or '-' }}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteLevel({{ level.id }})">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<script>
async function deleteLevel(id) {
    if (!confirm('确定要删除此等级吗？')) return;
    await fetch(`/api/levels/${id}`, { method: 'DELETE' });
    location.reload();
}
</script>
{% endblock %}
