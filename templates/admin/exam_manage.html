<!DOCTYPE html>
<html lang="zh-CN">
<head>
    {% include "partials/head.html" %}
    <title>试卷管理 - {{ app_name }}</title>
</head>
<body>
    {% include "partials/navbar.html" %}
    
    <main class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3">试卷管理</h1>
            <div>
                <a href="{{ url_for('main.upload_page') }}" class="btn btn-success me-2">
                    <i class="bi bi-upload me-1"></i>上传试卷
                </a>
                <button class="btn btn-danger d-none" id="batchDeleteBtn" onclick="batchDeleteExams()">
                    <i class="bi bi-trash me-1"></i>批量删除 (<span id="selectedCount">0</span>)
                </button>
            </div>
        </div>

        <!-- 筛选区域 -->
        <div class="card mb-4">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">科目</label>
                        <select class="form-select" id="filterSubject" onchange="loadExams()">
                            <option value="">全部科目</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">等级</label>
                        <select class="form-select" id="filterLevel" onchange="loadExams()" disabled>
                            <option value="">全部等级</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">搜索</label>
                        <input type="text" class="form-control" id="filterSearch" placeholder="搜索试卷标题" oninput="loadExams()">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button class="btn btn-outline-secondary w-100" onclick="resetFilters()">
                            <i class="bi bi-x-circle me-1"></i>重置
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 试卷列表 -->
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th width="50">
                                    <input type="checkbox" class="form-check-input" id="selectAll" onchange="toggleSelectAll()">
                                </th>
                                <th>ID</th>
                                <th>标题</th>
                                <th>科目</th>
                                <th>等级</th>
                                <th>题目数</th>
                                <th>总分</th>
                                <th>时长</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="examsBody">
                            <!-- 动态加载 -->
                        </tbody>
                    </table>
                </div>
                <!-- 分页 -->
                <div id="pagination" class="d-flex justify-content-center mt-3"></div>
            </div>
        </div>
    </main>

    <!-- 编辑试卷模态框 -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">编辑试卷</h5>
                    <button type="button" class="btn-close" onclick="closeModal('editModal')"></button>
                </div>
                <div class="modal-body">
                    <form id="editForm">
                        <input type="hidden" id="editExamId">
                        <div class="mb-3">
                            <label class="form-label">试卷标题 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="editTitle" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">科目 <span class="text-danger">*</span></label>
                            <select class="form-select" id="editSubject" required>
                                <option value="">请选择科目</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">等级 <span class="text-danger">*</span></label>
                            <select class="form-select" id="editLevel" required>
                                <option value="">请选择等级</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">时长（分钟）</label>
                            <input type="number" class="form-control" id="editDuration" placeholder="留空表示不限时">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">及格分数</label>
                            <input type="number" class="form-control" id="editPassScore">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">状态</label>
                            <select class="form-select" id="editStatus">
                                <option value="true">启用</option>
                                <option value="false">禁用</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('editModal')">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveExam()">
                        <i class="bi bi-save me-1"></i>保存
                    </button>
                </div>
            </div>
        </div>
    </div>

    {% include "partials/footer.html" %}
    {% include "partials/scripts.html" %}

    <script>
        let currentPage = 1;
        let examData = [];

        // 加载科目和等级
        function loadSubjects() {
            fetch('/api/subjects')
                .then(response => response.json())
                .then(data => {
                    console.log('Subjects response:', data);
                    if (data.success) {
                        const subjects = (data.data && data.data.subjects) || [];
                        const options = subjects.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
                        document.getElementById('filterSubject').innerHTML = '<option value="">全部科目</option>' + options;
                        document.getElementById('editSubject').innerHTML = '<option value="">请选择科目</option>' + options;

                        // 移除旧的事件监听器，避免重复添加
                        ['filterSubject', 'editSubject'].forEach(id => {
                            const element = document.getElementById(id);
                            const newElement = element.cloneNode(true);
                            element.parentNode.replaceChild(newElement, element);
                        });

                        // 科目变化时加载等级
                        document.getElementById('filterSubject').addEventListener('change', (e) => {
                            loadLevelsForSelect(e.target.value, 'filterLevel');
                        });
                        document.getElementById('editSubject').addEventListener('change', (e) => {
                            loadLevelsForSelect(e.target.value, 'editLevel');
                        });
                    } else {
                        console.error('Failed to load subjects:', data.message);
                    }
                })
                .catch(error => {
                    console.error('Error loading subjects:', error);
                });
        }

        // 加载等级到指定选择框
        function loadLevelsForSelect(subjectId, selectId) {
            const select = document.getElementById(selectId);
            if (!select) {
                console.error(`Select element with id ${selectId} not found`);
                return;
            }

            if (!subjectId) {
                const defaultText = selectId === 'filterLevel' ? '全部等级' : '请选择等级';
                select.innerHTML = `<option value="">${defaultText}</option>`;
                select.disabled = true;
                return;
            }

            fetch(`/api/subjects/${subjectId}/levels`)
                .then(response => response.json())
                .then(data => {
                    console.log(`Levels response for subject ${subjectId}:`, data);
                    if (data.success) {
                        const apiData = data.data || {};
                        const levels = apiData.items || apiData.levels || [];
                        const defaultText = selectId === 'filterLevel' ? '全部等级' : '请选择等级';
                        const options = levels.map(l => `<option value="${l.id}">${l.name}</option>`).join('');
                        select.innerHTML = `<option value="">${defaultText}</option>` + options;
                        select.disabled = false;
                    } else {
                        console.error('Failed to load levels:', data.message);
                        select.innerHTML = '<option value="">加载失败</option>';
                    }
                })
                .catch(error => {
                    console.error('Error loading levels:', error);
                    select.innerHTML = '<option value="">加载失败</option>';
                });
        }

        // 加载试卷列表
        function loadExams(page = 1) {
            const subjectId = document.getElementById('filterSubject').value;
            const levelId = document.getElementById('filterLevel').value;
            const search = document.getElementById('filterSearch').value;

            let url = `/admin/api/exams?page=${page}&per_page=10`;
            if (subjectId) url += `&subject_id=${subjectId}`;
            if (levelId) url += `&level_id=${levelId}`;
            if (search) url += `&search=${encodeURIComponent(search)}`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    console.log('Exams response:', data);
                    if (data.success) {
                        const apiData = data.data || {};
                        examData = apiData.exams || [];
                        renderExams(examData);
                        renderPagination(apiData.pagination || null);
                    } else {
                        console.error('Failed to load exams:', data.message);
                        examData = [];
                        renderExams([]);
                        renderPagination(null);
                    }
                })
                .catch(error => {
                    console.error('Error loading exams:', error);
                    examData = [];
                    renderExams([]);
                    renderPagination(null);
                });
        }

        // 渲染试卷列表
        function renderExams(exams) {
            console.log('渲染试卷列表，试卷数据:', exams);
            const tbody = document.getElementById('examsBody');
            tbody.innerHTML = exams.map(exam => `
                <tr data-exam-id="${exam.id}">
                    <td>
                        <input type="checkbox" class="form-check-input exam-checkbox" value="${exam.id}" onchange="updateSelectedCount()">
                    </td>
                    <td>${exam.id}</td>
                    <td>
                        <strong>${exam.title}</strong>
                    </td>
                    <td>${exam.subject ? exam.subject.name : '未知'}</td>
                    <td>${exam.level ? exam.level.name : '未知'}</td>
                    <td><span class="badge bg-info">${exam.question_count || 0}</span></td>
                    <td><span class="badge bg-success">${exam.total_score || 0} 分</span></td>
                    <td>${exam.duration_minutes ? exam.duration_minutes + ' 分钟' : '不限时'}</td>
                    <td>
                        <span class="badge ${exam.is_active ? 'bg-success' : 'bg-secondary'}">
                            ${exam.is_active ? '启用' : '禁用'}
                        </span>
                    </td>
                    <td>
                        <a href="/exam-edit/${exam.id}" class="btn btn-sm btn-outline-primary me-1">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteExam(${exam.id})">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
            updateSelectedCount();
        }

        // 渲染分页
        function renderPagination(pagination) {
            const container = document.getElementById('pagination');
            if (!pagination) {
                container.innerHTML = '';
                return;
            }

            let html = '<nav><ul class="pagination">';

            if (pagination.has_prev) {
                html += `<li class="page-item"><a class="page-link" href="#" onclick="loadExams(${pagination.page - 1})">上一页</a></li>`;
            }

            html += `<li class="page-item active"><span class="page-link">${pagination.page}</span></li>`;

            if (pagination.has_next) {
                html += `<li class="page-item"><a class="page-link" href="#" onclick="loadExams(${pagination.page + 1})">下一页</a></li>`;
            }

            html += '</ul></nav>';
            container.innerHTML = html;
        }

        // 编辑试卷
        function editExam(examId) {
            const exam = examData.find(e => e.id === examId);
            if (!exam) return;

            document.getElementById('editExamId').value = exam.id;
            document.getElementById('editTitle').value = exam.title;
            document.getElementById('editSubject').value = exam.subject_id;
            document.getElementById('editLevel').value = exam.level_id;
            document.getElementById('editDuration').value = exam.duration_minutes || '';
            document.getElementById('editPassScore').value = exam.pass_score || 60;
            document.getElementById('editStatus').value = exam.is_active.toString();

            // 加载对应等级
            loadLevelsForSelect(exam.subject_id, 'editLevel');

            document.getElementById('editModal').classList.add('show');
            document.querySelector('#editModal').style.display = 'block';
        }

        // 保存试卷
        function saveExam() {
            const examId = document.getElementById('editExamId').value;
            const data = {
                title: document.getElementById('editTitle').value,
                subject_id: parseInt(document.getElementById('editSubject').value),
                level_id: parseInt(document.getElementById('editLevel').value),
                duration_minutes: document.getElementById('editDuration').value || null,
                pass_score: parseFloat(document.getElementById('editPassScore').value),
                is_active: document.getElementById('editStatus').value === 'true'
            };

            fetch(`/admin/api/exams/${examId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('保存成功！');
                    closeModal('editModal');
                    loadExams();
                } else {
                    alert('保存失败：' + data.message);
                }
            });
        }

        // 删除试卷
        function deleteExam(examId) {
            if (!confirm('确定要删除这个试卷吗？')) return;

            fetch(`/admin/api/exams/${examId}`, {
                method: 'DELETE'
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('删除成功！');
                    loadExams();
                } else {
                    alert('删除失败：' + data.message);
                }
            });
        }

        // 全选/取消全选
        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAll').checked;
            document.querySelectorAll('.exam-checkbox').forEach(checkbox => {
                checkbox.checked = selectAll;
            });
            updateSelectedCount();
        }

        // 更新选中计数
        function updateSelectedCount() {
            const selected = document.querySelectorAll('.exam-checkbox:checked');
            const count = selected.length;
            document.getElementById('selectedCount').textContent = count;
            const batchDeleteBtn = document.getElementById('batchDeleteBtn');
            if (count > 0) {
                batchDeleteBtn.classList.remove('d-none');
            } else {
                batchDeleteBtn.classList.add('d-none');
            }
        }

        // 批量删除试卷
        function batchDeleteExams() {
            const selected = document.querySelectorAll('.exam-checkbox:checked');
            const examIds = Array.from(selected).map(cb => parseInt(cb.value));

            if (examIds.length === 0) {
                alert('请至少选择一个试卷');
                return;
            }

            if (!confirm(`确定要删除选中的 ${examIds.length} 个试卷吗？此操作不可恢复！`)) return;

            fetch('/admin/api/exams/batch-delete', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ exam_ids: examIds })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert(`成功删除 ${examIds.length} 个试卷！`);
                    document.getElementById('selectAll').checked = false;
                    loadExams();
                } else {
                    alert('删除失败：' + data.message);
                }
            })
            .catch(error => {
                alert('删除失败：' + error.message);
            });
        }

        // 重置筛选
        function resetFilters() {
            document.getElementById('filterSubject').value = '';
            document.getElementById('filterLevel').value = '';
            document.getElementById('filterSearch').value = '';
            loadExams(1);
        }

        // 关闭模态框
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
            document.querySelector(`#${modalId}`).style.display = 'none';
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadSubjects();
            loadExams();

            // 点击模态框外部关闭
            document.querySelectorAll('.modal').forEach(modal => {
                modal.addEventListener('click', function(e) {
                    if (e.target === this) {
                        closeModal(this.id);
                    }
                });
            });
        });
    </script>
</body>
</html>
