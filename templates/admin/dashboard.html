{% extends "base.html" %}

{% block title %}管理员仪表盘 - {{ super() }}{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2 class="mb-4"><i class="bi bi-speedometer2"></i> 管理员仪表盘</h2>
    </div>
</div>

<!-- 统计卡片 -->
<div class="row g-4 mb-4">
    <div class="col-md-3">
        <div class="card bg-primary text-white">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="card-title">用户总数</h6>
                        <h2 class="mb-0">{{ stats.total_users }}</h2>
                    </div>
                    <i class="bi bi-people fs-1 opacity-50"></i>
                </div>
            </div>
            <div class="card-footer bg-transparent border-0">
                <a href="/admin/users" class="text-white text-decoration-none">查看详情 <i class="bi bi-arrow-right"></i></a>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card bg-success text-white">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="card-title">试卷总数</h6>
                        <h2 class="mb-0">{{ stats.total_exams }}</h2>
                    </div>
                    <i class="bi bi-file-earmark-text fs-1 opacity-50"></i>
                </div>
            </div>
            <div class="card-footer bg-transparent border-0">
                <a href="/admin/exams" class="text-white text-decoration-none">查看详情 <i class="bi bi-arrow-right"></i></a>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card bg-info text-white">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="card-title">答题记录</h6>
                        <h2 class="mb-0">{{ stats.total_submissions }}</h2>
                    </div>
                    <i class="bi bi-clipboard-check fs-1 opacity-50"></i>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card bg-warning text-dark">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="card-title">科目数量</h6>
                        <h2 class="mb-0">-</h2>
                    </div>
                    <i class="bi bi-book fs-1 opacity-50"></i>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 快捷操作 -->
<div class="row">
    <div class="col-12">
        <h4 class="mb-3">快捷操作</h4>
    </div>
    <div class="col-md-3">
        <a href="/admin/users" class="btn btn-outline-primary w-100 py-3">
            <i class="bi bi-people"></i> 用户管理
        </a>
    </div>
    <div class="col-md-3">
        <a href="/admin/subjects" class="btn btn-outline-success w-100 py-3">
            <i class="bi bi-book"></i> 科目管理
        </a>
    </div>
    <div class="col-md-3">
        <a href="/admin/exams" class="btn btn-outline-info w-100 py-3">
            <i class="bi bi-file-earmark-plus"></i> 试卷管理
        </a>
    </div>
    <div class="col-md-3">
        <a href="/admin/bind-requests" class="btn btn-outline-warning w-100 py-3">
            <i class="bi bi-person-bounding-box"></i> 绑定申请
        </a>
    </div>
</div>
{% endblock %}
