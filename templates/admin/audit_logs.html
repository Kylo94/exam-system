{% extends "admin/admin_base.html" %}

{% block title %}审计日志 - {{ settings.APP_NAME }}{% endblock %}

{% block admin_content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h2 class="mb-1"><i class="bi bi-clock-history text-secondary"></i> 审计日志</h2>
        <p class="text-secondary small mb-0">共 <span id="totalLogs">0</span> 条记录</p>
    </div>
</div>

<!-- 筛选 -->
<div class="card mb-4">
    <div class="card-body">
        <div class="row g-3">
            <div class="col-md-2">
                <label class="form-label small">操作类型</label>
                <select class="form-select" id="filterAction">
                    <option value="">全部</option>
                    <option value="create">创建</option>
                    <option value="update">更新</option>
                    <option value="delete">删除</option>
                    <option value="login">登录</option>
                    <option value="logout">登出</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label small">资源类型</label>
                <select class="form-select" id="filterResource">
                    <option value="">全部</option>
                    <option value="user">用户</option>
                    <option value="exam">试卷</option>
                    <option value="question">题目</option>
                    <option value="subject">科目</option>
                    <option value="auth">认证</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label small">状态</label>
                <select class="form-select" id="filterStatus">
                    <option value="">全部</option>
                    <option value="success">成功</option>
                    <option value="failed">失败</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label small">日期范围</label>
                <div class="input-group">
                    <input type="date" class="form-control" id="filterStartDate">
                    <span class="input-group-text">至</span>
                    <input type="date" class="form-control" id="filterEndDate">
                </div>
            </div>
            <div class="col-md-3 d-flex align-items-end">
                <button class="btn btn-primary" onclick="loadLogs(1)">
                    <i class="bi bi-search me-2"></i>筛选
                </button>
                <button class="btn btn-secondary ms-2" onclick="resetFilters()">
                    <i class="bi bi-x-circle me-2"></i>重置
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 日志列表 -->
<div class="card">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th class="text-purple">时间</th>
                        <th class="text-purple">用户</th>
                        <th class="text-purple">操作</th>
                        <th class="text-purple">资源</th>
                        <th class="text-purple">描述</th>
                        <th class="text-purple">IP</th>
                        <th class="text-purple">状态</th>
                    </tr>
                </thead>
                <tbody id="logsTableBody">
                    <tr>
                        <td colspan="7" class="text-center text-muted py-4">
                            <i class="bi bi-hourglass-split me-2"></i>加载中...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- 分页 -->
<div class="d-flex justify-content-between align-items-center mt-3">
    <div class="text-secondary small">
        第 <span id="currentPage">1</span> / <span id="totalPages">1</span> 页，共 <span id="totalCount">0</span> 条
    </div>
    <nav>
        <ul class="pagination mb-0" id="pagination">
        </ul>
    </nav>
</div>

<!-- 详情Modal -->
<div class="modal fade" id="logDetailModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">日志详情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="logDetailContent">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentPage = 1;

document.addEventListener('DOMContentLoaded', function() {
    loadLogs(1);
});

async function loadLogs(page) {
    currentPage = page;

    const params = new URLSearchParams();
    params.append('page', page);
    params.append('page_size', 50);

    const action = document.getElementById('filterAction').value;
    const resource = document.getElementById('filterResource').value;
    const status = document.getElementById('filterStatus').value;
    const startDate = document.getElementById('filterStartDate').value;
    const endDate = document.getElementById('filterEndDate').value;

    if (action) params.append('action', action);
    if (resource) params.append('resource', resource);
    if (status) params.append('status', status);
    if (startDate) params.append('start_date', startDate);
    if (endDate) params.append('end_date', endDate);

    try {
        const response = await fetch(`/admin/api/audit-logs?${params.toString()}`, {
            credentials: 'include'
        });
        const result = await response.json();

        if (result.success) {
            renderLogs(result.data);
            updatePagination(result.total, result.page, result.page_size);
            document.getElementById('totalLogs').textContent = result.total;
        }
    } catch (error) {
        console.error('加载日志失败:', error);
        document.getElementById('logsTableBody').innerHTML =
            '<tr><td colspan="7" class="text-center text-danger py-4">加载失败</td></tr>';
    }
}

function renderLogs(logs) {
    if (logs.length === 0) {
        document.getElementById('logsTableBody').innerHTML =
            '<tr><td colspan="7" class="text-center text-muted py-4">暂无日志数据</td></tr>';
        return;
    }

    const tbody = document.getElementById('logsTableBody');
    tbody.innerHTML = logs.map(log => `
        <tr onclick="showLogDetail(${log.id})" style="cursor: pointer;">
            <td><small>${formatDate(log.created_at)}</small></td>
            <td>${escapeHtml(log.username || '系统')}</td>
            <td>${getActionBadge(log.action)}</td>
            <td>${getResourceBadge(log.resource)}</td>
            <td style="max-width: 200px;">
                <div class="text-truncate" title="${escapeHtml(log.description || '')}">${escapeHtml(log.description || '-')}</div>
            </td>
            <td><small>${log.ip_address || '-'}</small></td>
            <td>${getStatusBadge(log.status)}</td>
        </tr>
    `).join('');
}

function getActionBadge(action) {
    const map = {
        'create': { class: 'success', text: '创建' },
        'update': { class: 'primary', text: '更新' },
        'delete': { class: 'danger', text: '删除' },
        'login': { class: 'info', text: '登录' },
        'logout': { class: 'secondary', text: '登出' },
    };
    const info = map[action] || { class: 'light', text: action };
    return `<span class="badge bg-${info.class}">${info.text}</span>`;
}

function getResourceBadge(resource) {
    const map = {
        'user': { class: 'purple', text: '用户' },
        'exam': { class: 'success', text: '试卷' },
        'question': { class: 'info', text: '题目' },
        'subject': { class: 'warning', text: '科目' },
        'auth': { class: 'secondary', text: '认证' },
    };
    const info = map[resource] || { class: 'light', text: resource };
    return `<span class="badge bg-${info.class}">${info.text}</span>`;
}

function getStatusBadge(status) {
    const info = status === 'success'
        ? { class: 'success', text: '成功' }
        : { class: 'danger', text: '失败' };
    return `<span class="badge bg-${info.class}">${info.text}</span>`;
}

function formatDate(dateStr) {
    if (!dateStr) return '-';
    const date = new Date(dateStr);
    return date.toLocaleString('zh-CN');
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function updatePagination(total, page, pageSize) {
    const totalPages = Math.ceil(total / pageSize);
    document.getElementById('totalCount').textContent = total;
    document.getElementById('currentPage').textContent = page;
    document.getElementById('totalPages').textContent = totalPages;

    const pagination = document.getElementById('pagination');
    let html = '';

    if (totalPages <= 1) {
        pagination.innerHTML = '';
        return;
    }

    html += `<li class="page-item ${page <= 1 ? 'disabled' : ''}">
        <a class="page-link" href="javascript:loadLogs(${page - 1})">上一页</a>
    </li>`;

    const start = Math.max(1, page - 2);
    const end = Math.min(totalPages, page + 2);

    if (start > 1) {
        html += `<li class="page-item"><a class="page-link" href="javascript:loadLogs(1)">1</a></li>`;
        if (start > 2) html += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
    }

    for (let i = start; i <= end; i++) {
        html += `<li class="page-item ${i === page ? 'active' : ''}">
            <a class="page-link" href="javascript:loadLogs(${i})">${i}</a>
        </li>`;
    }

    if (end < totalPages) {
        if (end < totalPages - 1) html += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
        html += `<li class="page-item"><a class="page-link" href="javascript:loadLogs(${totalPages})">${totalPages}</a></li>`;
    }

    html += `<li class="page-item ${page >= totalPages ? 'disabled' : ''}">
        <a class="page-link" href="javascript:loadLogs(${page + 1})">下一页</a>
    </li>`;

    pagination.innerHTML = html;
}

let allLogs = [];

async function showLogDetail(id) {
    // 找到对应的日志
    const log = allLogs.find(l => l.id === id);
    if (!log) return;

    let detailsHtml = '';
    if (log.details && Object.keys(log.details).length > 0) {
        detailsHtml = '<div class="mt-3"><strong>详情：</strong><pre class="bg-light p-2 rounded">' +
            JSON.stringify(log.details, null, 2) + '</pre></div>';
    }

    document.getElementById('logDetailContent').innerHTML = `
        <div class="mb-2"><strong>ID：</strong>${log.id}</div>
        <div class="mb-2"><strong>用户：</strong>${escapeHtml(log.username)} (ID: ${log.user_id || '-'})</div>
        <div class="mb-2"><strong>操作：</strong>${getActionBadge(log.action)}</div>
        <div class="mb-2"><strong>资源：</strong>${getResourceBadge(log.resource)} ${log.resource_id ? `(ID: ${log.resource_id})` : ''}</div>
        <div class="mb-2"><strong>描述：</strong>${escapeHtml(log.description || '-')}</div>
        <div class="mb-2"><strong>状态：</strong>${getStatusBadge(log.status)}</div>
        <div class="mb-2"><strong>IP：</strong>${log.ip_address || '-'}</div>
        <div class="mb-2"><strong>时间：</strong>${formatDate(log.created_at)}</div>
        ${detailsHtml}
    `;

    new bootstrap.Modal(document.getElementById('logDetailModal')).show();
}

function resetFilters() {
    document.getElementById('filterAction').value = '';
    document.getElementById('filterResource').value = '';
    document.getElementById('filterStatus').value = '';
    document.getElementById('filterStartDate').value = '';
    document.getElementById('filterEndDate').value = '';
    loadLogs(1);
}
</script>
{% endblock %}
