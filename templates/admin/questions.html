{% extends "admin/admin_base.html" %}

{% block title %}题目管理 - {{ settings.APP_NAME }}{% endblock %}

{% block admin_content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h2 class="mb-1"><i class="bi bi-list-check text-info"></i> 题目管理</h2>
        <p class="text-secondary small mb-0">共 <span id="totalQuestions">0</span> 道题目</p>
    </div>
    <div>
        <button class="btn btn-outline-danger" id="btnBatchDelete" disabled onclick="batchDeleteQuestions()">
            <i class="bi bi-trash me-2"></i>批量删除 (<span id="selectedCount">0</span>)
        </button>
    </div>
</div>

<!-- 筛选 -->
<div class="card mb-4">
    <div class="card-body">
        <div class="row g-3">
            <div class="col-md-3">
                <label class="form-label small">科目</label>
                <select class="form-select" id="filterSubject">
                    <option value="">全部科目</option>
                    {% for s in subjects %}
                    <option value="{{ s.id }}">{{ s.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label small">试卷</label>
                <select class="form-select" id="filterExam">
                    <option value="">全部试卷</option>
                    {% for e in exams %}
                    <option value="{{ e.id }}">{{ e.title }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label small">题型</label>
                <select class="form-select" id="filterType">
                    <option value="">全部题型</option>
                    {% for t in question_types %}
                    <option value="{{ t.value }}">{{ t.label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label small">难度</label>
                <select class="form-select" id="filterDifficulty">
                    <option value="">全部</option>
                    <option value="1">1 - 简单</option>
                    <option value="2">2</option>
                    <option value="3">3 - 中等</option>
                    <option value="4">4</option>
                    <option value="5">5 - 困难</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label small">图片</label>
                <select class="form-select" id="filterHasImage">
                    <option value="">全部</option>
                    <option value="true">有图片</option>
                    <option value="false">无图片</option>
                </select>
            </div>
        </div>
        <div class="row mt-3">
            <div class="col-md-6">
                <input type="text" class="form-control" id="searchKeyword" placeholder="搜索题目内容...">
            </div>
            <div class="col-md-6">
                <button class="btn btn-primary" onclick="loadQuestions(1)">
                    <i class="bi bi-search me-2"></i>筛选
                </button>
                <button class="btn btn-secondary" onclick="resetFilters()">
                    <i class="bi bi-x-circle me-2"></i>重置
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 题目列表 -->
<div class="card">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th style="width: 40px;">
                            <input type="checkbox" class="form-check-input" id="selectAll" onchange="toggleSelectAll()">
                        </th>
                        <th class="text-purple">ID</th>
                        <th class="text-purple">题型</th>
                        <th class="text-purple">难度</th>
                        <th class="text-purple">内容</th>
                        <th class="text-purple">所属试卷</th>
                        <th class="text-purple">分值</th>
                        <th class="text-purple">图片</th>
                        <th class="text-purple">操作</th>
                    </tr>
                </thead>
                <tbody id="questionsTableBody">
                    <tr>
                        <td colspan="9" class="text-center text-muted py-4">
                            <i class="bi bi-hourglass-split me-2"></i>加载中...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- 分页 -->
<div class="d-flex justify-content-between align-items-center mt-3">
    <div class="text-secondary small">
        第 <span id="currentPage">1</span> / <span id="totalPages">1</span> 页，共 <span id="totalCount">0</span> 条
    </div>
    <nav>
        <ul class="pagination mb-0" id="pagination">
        </ul>
    </nav>
</div>

<!-- 题目详情Modal -->
<div class="modal fade" id="questionDetailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">题目详情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="questionDetailContent">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
            </div>
        </div>
    </div>
</div>

<!-- 确认删除Modal -->
<div class="modal fade" id="confirmDeleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title text-danger">确认删除</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>确定要删除选中的 <strong id="deleteCount">0</strong> 道题目吗？</p>
                <p class="text-muted small">此操作不可恢复</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteBtn">确认删除</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentPage = 1;
let selectedQuestions = new Set();
let questionsData = [];

document.addEventListener('DOMContentLoaded', function() {
    loadQuestions(1);

    // 回车搜索
    document.getElementById('searchKeyword').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            loadQuestions(1);
        }
    });
});

async function loadQuestions(page) {
    currentPage = page;

    const params = new URLSearchParams();
    params.append('page', page);
    params.append('page_size', 30);

    const examId = document.getElementById('filterExam').value;
    const subjectId = document.getElementById('filterSubject').value;
    const type = document.getElementById('filterType').value;
    const difficulty = document.getElementById('filterDifficulty').value;
    const hasImage = document.getElementById('filterHasImage').value;
    const keyword = document.getElementById('searchKeyword').value;

    if (examId) params.append('exam_id', examId);
    if (subjectId) params.append('subject_id', subjectId);
    if (type) params.append('type', type);
    if (difficulty) params.append('difficulty', difficulty);
    if (hasImage) params.append('has_image', hasImage);

    try {
        const response = await fetch(`/admin/api/questions?${params.toString()}`, {
            credentials: 'include'
        });
        const result = await response.json();

        if (result.success) {
            renderQuestions(result.data);
            updatePagination(result.total, result.page, result.page_size);
            document.getElementById('totalQuestions').textContent = result.total;
        }
    } catch (error) {
        console.error('加载题目失败:', error);
        document.getElementById('questionsTableBody').innerHTML =
            '<tr><td colspan="9" class="text-center text-danger py-4">加载失败</td></tr>';
    }
}

function renderQuestions(questions) {
    questionsData = questions;

    if (questions.length === 0) {
        document.getElementById('questionsTableBody').innerHTML =
            '<tr><td colspan="9" class="text-center text-muted py-4">暂无题目数据</td></tr>';
        return;
    }

    const tbody = document.getElementById('questionsTableBody');
    tbody.innerHTML = questions.map(q => `
        <tr class="${selectedQuestions.has(q.id) ? 'table-primary' : ''}">
            <td>
                <input type="checkbox" class="form-check-input"
                    ${selectedQuestions.has(q.id) ? 'checked' : ''}
                    onchange="toggleSelect(${q.id})">
            </td>
            <td><code>${q.id}</code></td>
            <td><span class="badge bg-info">${q.type_display || q.type}</span></td>
            <td>
                <span class="badge bg-${getDifficultyColor(q.difficulty)}">${q.difficulty || 1}</span>
            </td>
            <td style="max-width: 300px;">
                <div class="text-truncate" title="${escapeHtml(q.content)}">${escapeHtml(q.content)}</div>
            </td>
            <td>
                <a href="/admin/exams/${q.exam_id}/edit" class="text-decoration-none">${q.exam_title || '-'}</a>
            </td>
            <td>${q.points}</td>
            <td>
                ${q.has_image ? '<i class="bi bi-image text-success"></i>' : '<i class="bi bi-dash text-muted"></i>'}
            </td>
            <td>
                <button class="btn btn-sm btn-outline-primary" onclick="showQuestionDetail(${q.id})">
                    <i class="bi bi-eye"></i>
                </button>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteQuestion(${q.id})">
                    <i class="bi bi-trash"></i>
                </button>
            </td>
        </tr>
    `).join('');
}

function getDifficultyColor(difficulty) {
    if (difficulty >= 4) return 'danger';
    if (difficulty >= 3) return 'warning';
    return 'success';
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function updatePagination(total, page, pageSize) {
    const totalPages = Math.ceil(total / pageSize);
    document.getElementById('totalCount').textContent = total;
    document.getElementById('currentPage').textContent = page;
    document.getElementById('totalPages').textContent = totalPages;

    const pagination = document.getElementById('pagination');
    let html = '';

    if (totalPages <= 1) {
        pagination.innerHTML = '';
        return;
    }

    // 上一页
    html += `<li class="page-item ${page <= 1 ? 'disabled' : ''}">
        <a class="page-link" href="javascript:loadQuestions(${page - 1})">上一页</a>
    </li>`;

    // 页码
    const start = Math.max(1, page - 2);
    const end = Math.min(totalPages, page + 2);

    if (start > 1) {
        html += `<li class="page-item"><a class="page-link" href="javascript:loadQuestions(1)">1</a></li>`;
        if (start > 2) html += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
    }

    for (let i = start; i <= end; i++) {
        html += `<li class="page-item ${i === page ? 'active' : ''}">
            <a class="page-link" href="javascript:loadQuestions(${i})">${i}</a>
        </li>`;
    }

    if (end < totalPages) {
        if (end < totalPages - 1) html += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
        html += `<li class="page-item"><a class="page-link" href="javascript:loadQuestions(${totalPages})">${totalPages}</a></li>`;
    }

    // 下一页
    html += `<li class="page-item ${page >= totalPages ? 'disabled' : ''}">
        <a class="page-link" href="javascript:loadQuestions(${page + 1})">下一页</a>
    </li>`;

    pagination.innerHTML = html;
}

function toggleSelect(id) {
    if (selectedQuestions.has(id)) {
        selectedQuestions.delete(id);
    } else {
        selectedQuestions.add(id);
    }
    updateSelectedUI();
}

function toggleSelectAll() {
    const checked = document.getElementById('selectAll').checked;
    if (checked) {
        questionsData.forEach(q => selectedQuestions.add(q.id));
    } else {
        selectedQuestions.clear();
    }
    renderQuestions(questionsData);
    updateSelectedUI();
}

function updateSelectedUI() {
    const count = selectedQuestions.size;
    document.getElementById('selectedCount').textContent = count;
    document.getElementById('btnBatchDelete').disabled = count === 0;
}

function showQuestionDetail(id) {
    const q = questionsData.find(q => q.id === id);
    if (!q) return;

    let optionsHtml = '';
    if (q.options && Object.keys(q.options).length > 0) {
        optionsHtml = '<div class="mb-3"><strong>选项：</strong><ul class="mt-2">';
        for (const [key, value] of Object.entries(q.options)) {
            const isCorrect = q.correct_answer.toUpperCase() === key.toUpperCase();
            optionsHtml += `<li class="${isCorrect ? 'text-success fw-bold' : ''}">${key}. ${escapeHtml(value)} ${isCorrect ? '✓' : ''}</li>`;
        }
        optionsHtml += '</ul></div>';
    }

    document.getElementById('questionDetailContent').innerHTML = `
        <div class="row mb-3">
            <div class="col-md-4"><strong>题型：</strong>${q.type_display || q.type}</div>
            <div class="col-md-4"><strong>难度：</strong>${q.difficulty || 1}</div>
            <div class="col-md-4"><strong>分值：</strong>${q.points}分</div>
        </div>
        <div class="mb-3">
            <strong>题目内容：</strong>
            <div class="p-3 bg-light rounded">${escapeHtml(q.content)}</div>
        </div>
        ${optionsHtml}
        <div class="mb-3">
            <strong>正确答案：</strong>
            <code class="text-success fs-5">${q.correct_answer}</code>
        </div>
        ${q.exam_id ? `<div class="mb-3"><strong>所属试卷：</strong><a href="/admin/exams/${q.exam_id}/edit">${q.exam_title}</a></div>` : ''}
        ${q.knowledge_point ? `<div class="mb-3"><strong>知识点：</strong>${q.knowledge_point}</div>` : ''}
        ${q.created_at ? `<div class="text-muted small"><strong>创建时间：</strong>${new Date(q.created_at).toLocaleString()}</div>` : ''}
    `;

    new bootstrap.Modal(document.getElementById('questionDetailModal')).show();
}

async function deleteQuestion(id) {
    if (!confirm('确定要删除这道题目吗？')) return;

    try {
        const response = await fetch(`/admin/api/questions/${id}`, {
            method: 'DELETE',
            credentials: 'include'
        });

        if (response.ok) {
            selectedQuestions.delete(id);
            loadQuestions(currentPage);
        } else {
            alert('删除失败');
        }
    } catch (error) {
        alert('删除失败: ' + error.message);
    }
}

function batchDeleteQuestions() {
    const count = selectedQuestions.size;
    if (count === 0) return;

    document.getElementById('deleteCount').textContent = count;
    new bootstrap.Modal(document.getElementById('confirmDeleteModal')).show();
}

document.getElementById('confirmDeleteBtn').addEventListener('click', async function() {
    const ids = Array.from(selectedQuestions);
    if (ids.length === 0) return;

    try {
        const response = await fetch('/admin/api/questions/batch-delete', {
            method: 'POST',
            credentials: 'include',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(ids)
        });

        if (response.ok) {
            selectedQuestions.clear();
            updateSelectedUI();
            bootstrap.Modal.getInstance(document.getElementById('confirmDeleteModal')).hide();
            loadQuestions(currentPage);
        } else {
            alert('批量删除失败');
        }
    } catch (error) {
        alert('批量删除失败: ' + error.message);
    }
});

function resetFilters() {
    document.getElementById('filterSubject').value = '';
    document.getElementById('filterExam').value = '';
    document.getElementById('filterType').value = '';
    document.getElementById('filterDifficulty').value = '';
    document.getElementById('filterHasImage').value = '';
    document.getElementById('searchKeyword').value = '';
    loadQuestions(1);
}

// 科目变化时加载对应试卷
document.getElementById('filterSubject').addEventListener('change', async function() {
    const subjectId = this.value;
    const examSelect = document.getElementById('filterExam');

    examSelect.innerHTML = '<option value="">全部试卷</option>';

    if (!subjectId) return;

    // 获取该科目下的试卷
    const response = await fetch('/api/exams?subject_id=' + subjectId, {credentials: 'include'});
    const result = await response.json();

    if (result.success) {
        result.data.forEach(exam => {
            const option = document.createElement('option');
            option.value = exam.id;
            option.textContent = exam.title;
            examSelect.appendChild(option);
        });
    }
});
</script>
{% endblock %}
