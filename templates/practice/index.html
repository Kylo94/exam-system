<!DOCTYPE html>
<html lang="zh-CN">
<head>
    {% include "partials/head.html" %}
    <title>{{ app_name }} - 专项刷题</title>
</head>
<body>
    {% include "partials/navbar.html" %}

    <main class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h2">专项刷题</h1>
            <a href="{{ url_for('main.exams_page') }}" class="btn btn-outline-primary">
                <i class="bi bi-arrow-left me-1"></i>返回考试大厅
            </a>
        </div>

        <!-- 筛选条件 -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="card-title mb-0">筛选条件</h5>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">科目</label>
                        <select class="form-select" id="filterSubject">
                            <option value="">请选择科目</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">难度</label>
                        <select class="form-select" id="filterLevel" disabled>
                            <option value="">请先选择科目</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">考点</label>
                        <select class="form-select" id="filterKnowledgePoint" disabled>
                            <option value="">请先选择科目和难度</option>
                        </select>
                    </div>
                </div>
                <div class="mt-3">
                    <button class="btn btn-primary" id="startPractice">
                        <i class="bi bi-play-fill me-1"></i>开始刷题
                    </button>
                    <button class="btn btn-secondary ms-2" id="resetFilter">
                        <i class="bi bi-x-circle me-1"></i>重置筛选
                    </button>
                </div>
            </div>
        </div>

        <!-- 题目列表 -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="card-title mb-0">题目列表</h5>
                <span class="badge bg-secondary" id="questionCount">共 0 题</span>
            </div>
            <div class="card-body">
                <div id="questionsContainer" class="list-group">
                    <p class="text-muted text-center py-4">请选择科目、难度和考点开始刷题</p>
                </div>
            </div>
        </div>
    </main>

    {% include "partials/footer.html" %}
    {% include "partials/scripts.html" %}

    <script>
        let questions = [];
        let currentQuestionIndex = 0;

        // 加载科目列表
        async function loadSubjects() {
            try {
                const response = await fetch('/api/subjects');
                const result = await response.json();
                if (result.success && result.data && result.data.items) {
                    const select = document.getElementById('filterSubject');
                    select.innerHTML = '<option value="">请选择科目</option>';
                    result.data.items.forEach(subject => {
                        select.innerHTML += `<option value="${subject.id}">${subject.name}</option>`;
                    });
                }
            } catch (error) {
                console.error('加载科目失败:', error);
            }
        }

        // 科目改变时加载难度列表
        async function onSubjectChange() {
            const subjectId = document.getElementById('filterSubject').value;
            const levelSelect = document.getElementById('filterLevel');
            const kpSelect = document.getElementById('filterKnowledgePoint');

            levelSelect.innerHTML = '<option value="">请选择难度</option>';
            kpSelect.innerHTML = '<option value="">请先选择难度</option>';

            if (!subjectId) {
                levelSelect.disabled = true;
                kpSelect.disabled = true;
                return;
            }

            try {
                const response = await fetch(`/api/levels?subject_id=${subjectId}`);
                const result = await response.json();
                if (result.success && result.data && result.data.items) {
                    levelSelect.innerHTML = '<option value="">请选择难度</option>';
                    result.data.items.forEach(level => {
                        levelSelect.innerHTML += `<option value="${level.id}">${level.name}</option>`;
                    });
                    levelSelect.disabled = false;
                }
            } catch (error) {
                console.error('加载难度失败:', error);
            }

            kpSelect.disabled = true;
        }

        // 难度改变时加载考点列表
        async function onLevelChange() {
            const subjectId = document.getElementById('filterSubject').value;
            const levelId = document.getElementById('filterLevel').value;
            const kpSelect = document.getElementById('filterKnowledgePoint');

            kpSelect.innerHTML = '<option value="">请选择考点</option>';

            if (!levelId) {
                kpSelect.disabled = true;
                return;
            }

            try {
                const response = await fetch(`/api/knowledge-points/by-subject-level/${subjectId}/${levelId}`);
                const result = await response.json();
                if (result.success && result.data) {
                    kpSelect.innerHTML = '<option value="">请选择考点</option>';
                    result.data.forEach(kp => {
                        kpSelect.innerHTML += `<option value="${kp.id}">${kp.name}</option>`;
                    });
                    kpSelect.disabled = false;
                } else {
                    kpSelect.innerHTML = '<option value="">该科目难度下暂无考点</option>';
                }
            } catch (error) {
                console.error('加载考点失败:', error);
            }
        }

        // 开始刷题
        async function startPractice() {
            const subjectId = document.getElementById('filterSubject').value;
            const levelId = document.getElementById('filterLevel').value;
            const knowledgePointId = document.getElementById('filterKnowledgePoint').value;

            if (!subjectId || !levelId || !knowledgePointId) {
                alert('请选择科目、难度和考点');
                return;
            }

            try {
                const response = await fetch(`/api/questions/practice?subject_id=${subjectId}&level_id=${levelId}&knowledge_point_id=${knowledgePointId}`);
                const result = await response.json();

                if (result.success && result.data && result.data.questions) {
                    questions = result.data.questions;
                    renderQuestions();
                } else {
                    alert('没有找到符合条件的题目');
                }
            } catch (error) {
                console.error('获取题目失败:', error);
                alert('获取题目失败');
            }
        }

        // 渲染题目列表
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            const countBadge = document.getElementById('questionCount');

            countBadge.textContent = `共 ${questions.length} 题`;

            if (questions.length === 0) {
                container.innerHTML = '<p class="text-muted text-center py-4">没有找到符合条件的题目</p>';
                return;
            }

            container.innerHTML = questions.map((q, index) => `
                <div class="list-group-item" id="question-${index}">
                    <div class="d-flex w-100 justify-content-between align-items-start">
                        <h6 class="mb-1">${index + 1}. ${q.content.substring(0, 100)}${q.content.length > 100 ? '...' : ''}</h6>
                        <small class="text-muted">${q.points}分</small>
                    </div>
                    <div class="mt-2">
                        <span class="badge bg-secondary">${q.type}</span>
                        <span class="badge bg-info">${q.knowledge_point_name || '无考点'}</span>
                    </div>
                </div>
            `).join('');
        }

        // 重置筛选
        function resetFilter() {
            document.getElementById('filterSubject').value = '';
            document.getElementById('filterLevel').value = '';
            document.getElementById('filterLevel').disabled = true;
            document.getElementById('filterKnowledgePoint').value = '';
            document.getElementById('filterKnowledgePoint').disabled = true;
            questions = [];
            document.getElementById('questionsContainer').innerHTML = '<p class="text-muted text-center py-4">请选择科目、难度和考点开始刷题</p>';
            document.getElementById('questionCount').textContent = '共 0 题';
        }

        // 事件绑定
        document.addEventListener('DOMContentLoaded', () => {
            loadSubjects();
            document.getElementById('filterSubject').addEventListener('change', onSubjectChange);
            document.getElementById('filterLevel').addEventListener('change', onLevelChange);
            document.getElementById('startPractice').addEventListener('click', startPractice);
            document.getElementById('resetFilter').addEventListener('click', resetFilter);
        });
    </script>
</body>
</html>
