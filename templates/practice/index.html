<!DOCTYPE html>
<html lang="zh-CN">
<head>
    {% include "partials/head.html" %}
    <title>{{ app_name }} - 专项刷题</title>
</head>
<body>
    {% include "partials/navbar.html" %}

    <main class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h2">专项刷题</h1>
            <a href="{{ url_for('main.exams_page') }}" class="btn btn-outline-primary">
                <i class="bi bi-arrow-left me-1"></i>返回考试大厅
            </a>
        </div>

        <!-- 筛选条件 -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="card-title mb-0">筛选条件</h5>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">科目</label>
                        <select class="form-select" id="filterSubject">
                            <option value="">请选择科目</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">难度</label>
                        <select class="form-select" id="filterLevel" disabled>
                            <option value="">请先选择科目</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">考点</label>
                        <select class="form-select" id="filterKnowledgePoint" disabled>
                            <option value="">请先选择难度</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">题目数量</label>
                        <select class="form-select" id="questionCountSelect" disabled>
                            <option value="5">5题</option>
                            <option value="10" selected>10题</option>
                            <option value="15">15题</option>
                            <option value="20">20题</option>
                            <option value="30">30题</option>
                            <option value="all">全部</option>
                        </select>
                    </div>
                </div>
                <div class="mt-3">
                    <button class="btn btn-primary" id="startPractice" disabled>
                        <i class="bi bi-play-fill me-1"></i>开始刷题
                    </button>
                    <button class="btn btn-secondary ms-2" id="resetFilter">
                        <i class="bi bi-x-circle me-1"></i>重置筛选
                    </button>
                </div>
            </div>
        </div>
    </main>

    {% include "partials/footer.html" %}
    {% include "partials/scripts.html" %}

    {% block js %}
    <script>
        // 加载科目列表
        async function loadSubjects() {
            console.log('loadSubjects 被调用');
            try {
                const response = await fetch('/api/subjects');
                console.log('subjects API响应状态:', response.status);
                const result = await response.json();
                console.log('subjects API响应数据:', result);

                if (result.success && result.data && Array.isArray(result.data)) {
                    const select = document.getElementById('filterSubject');
                    select.innerHTML = '<option value="">请选择科目</option>';
                    result.data.forEach(subject => {
                        select.innerHTML += `<option value="${subject.id}">${subject.name}</option>`;
                    });
                    console.log('科目加载完成，共', result.data.length, '个科目');
                } else {
                    console.log('科目响应格式不符合预期');
                }
            } catch (error) {
                console.error('加载科目失败:', error);
            }
        }

        // 科目改变时加载难度列表
        async function onSubjectChange() {
            console.log('onSubjectChange 被调用');
            const subjectId = document.getElementById('filterSubject').value;
            console.log('选择的科目ID:', subjectId);
            const levelSelect = document.getElementById('filterLevel');
            const kpSelect = document.getElementById('filterKnowledgePoint');
            const countSelect = document.getElementById('questionCountSelect');

            levelSelect.innerHTML = '<option value="">请选择难度</option>';
            kpSelect.innerHTML = '<option value="">请先选择难度</option>';
            countSelect.disabled = true;
            document.getElementById('startPractice').disabled = true;

            if (!subjectId) {
                levelSelect.disabled = true;
                kpSelect.disabled = true;
                return;
            }

            try {
                const response = await fetch(`/api/levels/by-subject/${subjectId}`);
                const result = await response.json();
                console.log('难度API响应:', result);
                if (result.success && result.data && Array.isArray(result.data)) {
                    levelSelect.innerHTML = '<option value="">请选择难度</option>';
                    result.data.forEach(level => {
                        levelSelect.innerHTML += `<option value="${level.id}">${level.name}</option>`;
                    });
                    levelSelect.disabled = false;
                    console.log('难度加载完成，共', result.data.length, '个难度');
                } else {
                    console.log('难度响应格式不符合预期');
                }
            } catch (error) {
                console.error('加载难度失败:', error);
            }

            kpSelect.disabled = true;
        }

        // 难度改变时加载考点列表
        async function onLevelChange() {
            console.log('onLevelChange 被调用');
            const subjectId = document.getElementById('filterSubject').value;
            const levelId = document.getElementById('filterLevel').value;
            console.log('科目ID:', subjectId, '难度ID:', levelId);
            const kpSelect = document.getElementById('filterKnowledgePoint');
            const countSelect = document.getElementById('questionCountSelect');

            kpSelect.innerHTML = '<option value="">请选择考点</option>';
            countSelect.disabled = true;
            document.getElementById('startPractice').disabled = true;

            if (!levelId) {
                kpSelect.disabled = true;
                return;
            }

            try {
                const response = await fetch(`/api/knowledge-points/by-subject-level/${subjectId}/${levelId}`);
                const result = await response.json();
                console.log('考点API响应:', result);
                if (result.success && result.data && Array.isArray(result.data)) {
                    kpSelect.innerHTML = '<option value="">请选择考点</option>';
                    result.data.forEach(kp => {
                        kpSelect.innerHTML += `<option value="${kp.id}">${kp.name}</option>`;
                    });
                    kpSelect.disabled = false;
                    countSelect.disabled = false;
                    console.log('考点加载完成，共', result.data.length, '个考点');
                } else {
                    kpSelect.innerHTML = '<option value="">该科目难度下暂无考点</option>';
                    console.log('考点响应格式不符合预期');
                }
            } catch (error) {
                console.error('加载考点失败:', error);
            }
        }

        // 考点改变时启用开始按钮
        function onKnowledgePointChange() {
            const kpSelect = document.getElementById('filterKnowledgePoint');
            const startBtn = document.getElementById('startPractice');

            if (kpSelect.value) {
                startBtn.disabled = false;
            } else {
                startBtn.disabled = true;
            }
        }

        // 开始刷题 - 创建临时试卷
        async function startPractice() {
            const subjectId = document.getElementById('filterSubject').value;
            const levelId = document.getElementById('filterLevel').value;
            const knowledgePointId = document.getElementById('filterKnowledgePoint').value;
            const questionCount = document.getElementById('questionCountSelect').value;

            if (!subjectId || !levelId || !knowledgePointId) {
                alert('请选择科目、难度和考点');
                return;
            }

            // 显示加载提示
            const startBtn = document.getElementById('startPractice');
            const originalText = startBtn.innerHTML;
            startBtn.disabled = true;
            startBtn.innerHTML = '<i class="bi bi-spinner me-1"></i>创建中...';

            try {
                const response = await fetch('/student/practice/create', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        subject_id: parseInt(subjectId),
                        level_id: parseInt(levelId),
                        knowledge_point_id: parseInt(knowledgePointId),
                        question_count: questionCount === 'all' ? null : parseInt(questionCount)
                    })
                });

                const result = await response.json();
                console.log('创建练习试卷响应:', result);

                if (result.success && result.data && result.data.exam_id) {
                    // 跳转到考试页面
                    window.location.href = `/exams/${result.data.exam_id}/start`;
                } else {
                    alert(result.message || '创建练习试卷失败');
                    startBtn.disabled = false;
                    startBtn.innerHTML = originalText;
                }
            } catch (error) {
                console.error('创建练习试卷失败:', error);
                alert('创建练习试卷失败');
                startBtn.disabled = false;
                startBtn.innerHTML = originalText;
            }
        }

        // 重置筛选
        function resetFilter() {
            document.getElementById('filterSubject').value = '';
            document.getElementById('filterLevel').value = '';
            document.getElementById('filterLevel').disabled = true;
            document.getElementById('filterKnowledgePoint').value = '';
            document.getElementById('filterKnowledgePoint').disabled = true;
            document.getElementById('questionCountSelect').disabled = true;
            document.getElementById('startPractice').disabled = true;
        }

        // 事件绑定
        document.addEventListener('DOMContentLoaded', () => {
            loadSubjects();
            document.getElementById('filterSubject').addEventListener('change', onSubjectChange);
            document.getElementById('filterLevel').addEventListener('change', onLevelChange);
            document.getElementById('filterKnowledgePoint').addEventListener('change', onKnowledgePointChange);
            document.getElementById('startPractice').addEventListener('click', startPractice);
            document.getElementById('resetFilter').addEventListener('click', resetFilter);
        });
    </script>
    {% endblock %}
</body>
</html>
