{% extends "base.html" %}

{% block title %}学生首页 - {{ super() }}{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2 class="mb-4"><i class="bi bi-mortarboard"></i> 学生首页</h2>
        <p class="text-muted">欢迎回来，{{ user.username }}！</p>
    </div>
</div>

<div class="row g-4">
    <div class="col-md-4">
        <a href="/student/exams" class="text-decoration-none">
            <div class="card border-primary h-100">
                <div class="card-body text-center">
                    <i class="bi bi-pencil-square fs-1 text-primary"></i>
                    <h5 class="mt-2">在线答题</h5>
                    <p class="text-muted small">开始新的答题</p>
                </div>
            </div>
        </a>
    </div>
    <div class="col-md-4">
        <a href="/student/history" class="text-decoration-none">
            <div class="card border-success h-100">
                <div class="card-body text-center">
                    <i class="bi bi-clock-history fs-1 text-success"></i>
                    <h5 class="mt-2">答题历史</h5>
                    <p class="text-muted small">查看历史成绩</p>
                </div>
            </div>
        </a>
    </div>
    <div class="col-md-4">
        <a href="/auth/profile" class="text-decoration-none">
            <div class="card border-info h-100">
                <div class="card-body text-center">
                    <i class="bi bi-person-circle fs-1 text-info"></i>
                    <h5 class="mt-2">个人资料</h5>
                    <p class="text-muted small">修改个人信息</p>
                </div>
            </div>
        </a>
    </div>
</div>
{% endblock %}
