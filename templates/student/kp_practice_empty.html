{% extends "base.html" %}

{% block title %}{{ kp.name }} - 暂无题目 - {{ get_app_name() }}{% endblock %}

{% block content %}
<div class="row mb-3">
    <div class="col-12">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb" style="background: var(--bg-tertiary); padding: 0.75rem 1rem; border-radius: 0.5rem;">
                <li class="breadcrumb-item"><a href="/student/kp-practice" class="text-decoration-none">知识点练习</a></li>
                <li class="breadcrumb-item"><a href="/student/kp-practice/{{ subject.id }}" class="text-decoration-none">{{ subject.name }}</a></li>
                <li class="breadcrumb-item active">{{ kp.name }}</li>
            </ol>
        </nav>
    </div>
</div>

<div class="row">
    <div class="col-lg-8">
        <div class="card" style="background: var(--bg-card); border: 1px solid var(--border-color);">
            <div class="card-body text-center py-5">
                <i class="bi bi-inbox fs-1 text-muted"></i>
                <h4 class="mt-3 text-muted">暂无题目</h4>
                <p class="text-secondary">该知识点下还没有题目，请联系管理员添加相关题目</p>
                <a href="/student/kp-practice/{{ subject.id }}" class="btn btn-outline-secondary mt-3">
                    <i class="bi bi-arrow-left me-1"></i>返回知识点列表
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
