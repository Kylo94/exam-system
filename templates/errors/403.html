<!DOCTYPE html>
<html lang="zh-CN">
<head>
    {% include "partials/head.html" %}
    <title>访问被拒绝 - {{ settings.APP_NAME }}</title>
</head>
<body>
    {% include "partials/navbar.html" %}

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                <div class="card">
                    <div class="card-body py-5">
                        <h1 class="display-1 text-danger mb-4">403</h1>
                        <h2 class="h3 mb-3">访问被拒绝</h2>
                        <p class="text-muted mb-4">
                            {% if message %}
                                {{ message }}
                            {% else %}
                                您没有权限访问此页面。
                            {% endif %}
                        </p>
                        <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                            <a href="{{ '/dashboard' }}" class="btn btn-primary btn-lg">
                                <i class="bi bi-house-door me-1"></i>返回首页
                            </a>
                            <a href="{{ '/my-submissions' }}" class="btn btn-outline-secondary btn-lg">
                                <i class="bi bi-list-ul me-1"></i>我的记录
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    {% include "partials/footer.html" %}
    {% include "partials/scripts.html" %}
</body>
</html>
