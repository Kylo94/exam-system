# ========================================
# 简化生产环境 Docker Compose 配置
# ========================================
# 服务：Flask Web 应用 + PostgreSQL 数据库
# 
# 使用方法：
#   1. cp .env.example .env
#   2. 编辑 .env 文件配置 SECRET_KEY
#   3. docker compose -f docker-compose.simple.yml up -d
#   4. 初始化数据库：docker exec exam-web flask db upgrade
#   5. 创建管理员：docker exec exam-web python create_admin.py

version: '3.8'

services:
  # PostgreSQL 数据库
  db:
    image: postgres:14-alpine
    container_name: exam-postgres
    environment:
      POSTGRES_DB: examdb
      POSTGRES_USER: examuser
      POSTGRES_PASSWORD: exam_password_123456
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - exam-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U examuser -d examdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Flask Web 应用
  web:
    build: .
    image: exam-system:latest
    container_name: exam-web
    command: gunicorn --bind 0.0.0.0:5002 --workers 2 --threads 2 --timeout 120 --access-logfile - --error-logfile - wsgi:app
    ports:
      - "5002:5002"
    environment:
      # Flask 配置
      FLASK_ENV: production
      FLASK_DEBUG: "false"

      # 数据库配置
      DATABASE_URL: postgresql://examuser:exam_password_123456@db:5432/examdb

      # 安全配置
      SECRET_KEY: dev-secret-key-for-local-use

      # 文件上传配置
      MAX_CONTENT_LENGTH: 52428800
      UPLOAD_FOLDER: /app/uploads

      # 日志配置
      LOG_LEVEL: INFO
    volumes:
      # 持久化上传文件
      - ./uploads:/app/uploads
      # 持久化日志
      - ./logs:/app/logs
      # 数据库迁移文件
      - ./migrations:/app/migrations:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - exam-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  exam-network:
    driver: bridge
