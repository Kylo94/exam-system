# PostgreSQL 生产环境优化配置

# 连接设置
max_connections = 100                # 最大连接数
shared_buffers = 256MB              # 共享缓冲区
effective_cache_size = 1GB          # 有效缓存大小
maintenance_work_mem = 64MB         # 维护操作内存
work_mem = 4MB                     # 每个查询操作的内存

# WAL 设置
wal_buffers = 16MB                 # WAL 缓冲区
min_wal_size = 1GB                # WAL 最小大小
max_wal_size = 4GB                # WAL 最大大小
checkpoint_completion_target = 0.9  # 检查点完成目标
wal_compression = on               # WAL 压缩

# 查询优化
random_page_cost = 1.1             # 随机页面成本（SSD 优化）
effective_io_concurrency = 200     # 有效 IO 并发（SSD 优化）
default_statistics_target = 100     # 默认统计目标

# 日志设置
logging_collector = on             # 启用日志收集
log_directory = 'pg_log'           # 日志目录
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_min_duration_statement = 1000   # 记录执行超过 1 秒的查询
log_checkpoints = on               # 记录检查点
log_connections = on               # 记录连接
log_disconnections = on            # 记录断开连接
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_lock_waits = on               # 记录锁等待

# 自动清理
autovacuum = on                   # 启用自动清理
autovacuum_max_workers = 3        # 自动清理工作进程数
autovacuum_naptime = 1min         # 自动清理间隔
autovacuum_vacuum_scale_factor = 0.1  # 自动清理阈值
autovacuum_analyze_scale_factor = 0.05 # 自动分析阈值

# 性能调优
synchronous_commit = off           # 异步提交（提升性能，可能丢失最近事务）
fsync = on                        # 强制同步到磁盘（数据安全）
full_page_writes = on             # 完整页面写入

# 时区设置
timezone = 'Asia/Shanghai'

# 编码设置
client_encoding = UTF8
